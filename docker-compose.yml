services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xero-frontend
    working_dir: /app/frontend
    env_file: .env
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/packages/shared/node_modules
